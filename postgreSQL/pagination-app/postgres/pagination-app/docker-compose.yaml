version: "3.8"

services:
  pagination-backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://postgres:postgres@localhost:5432/restaurant
    network_mode: "host"
    restart: always

  pagination-frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    network_mode: "host"
    restart: always
